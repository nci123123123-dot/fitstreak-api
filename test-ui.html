<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>FitStreak API Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 24px; }
    h1 { color: #fff; margin-bottom: 4px; font-size: 22px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; }
    .card h2 { font-size: 14px; color: #aaa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; margin-top: 10px; }
    input, textarea, select {
      width: 100%; padding: 8px 10px; background: #111; border: 1px solid #333;
      border-radius: 6px; color: #eee; font-size: 13px;
    }
    textarea { height: 70px; resize: vertical; }
    button {
      margin-top: 12px; width: 100%; padding: 10px; border-radius: 8px; border: none;
      background: #4f8ef7; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #3a7de0; }
    button.danger { background: #e05555; }
    button.danger:hover { background: #c93f3f; }
    .result {
      grid-column: 1 / -1; background: #111; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 16px;
    }
    .result h2 { font-size: 14px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    pre { font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #b0f0b0; max-height: 400px; overflow-y: auto; }
    .token-bar { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; }
    .token-bar span { color: #4f8ef7; font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-left: 6px; }
    .badge.ok { background: #1a3a1a; color: #4caf50; }
    .badge.err { background: #3a1a1a; color: #f44336; }
    .streak-display { text-align: center; padding: 16px 0; }
    .streak-num { font-size: 56px; font-weight: 800; color: #f7a84f; line-height: 1; }
    .streak-label { color: #666; font-size: 13px; margin-top: 4px; }
    .streak-sub { display: flex; justify-content: space-around; margin-top: 12px; }
    .streak-sub div { text-align: center; }
    .streak-sub .n { font-size: 22px; font-weight: 700; color: #fff; }
    .streak-sub .l { font-size: 11px; color: #555; }
    hr { border: none; border-top: 1px solid #222; margin: 16px 0; }
  </style>
</head>
<body>

<h1>🏋️ FitStreak API Tester</h1>
<p class="subtitle">실시간 API 테스트 · 서버: <strong>http://localhost:3000</strong></p>

<div class="token-bar">
  로그인 토큰: <span id="token-display">없음 (먼저 로그인하세요)</span>
</div>

<div class="grid">

  <!-- 회원가입 -->
  <div class="card">
    <h2>회원가입</h2>
    <label>이메일</label>
    <input id="reg-email" value="user@test.com">
    <label>이름</label>
    <input id="reg-name" value="테스트유저">
    <label>비밀번호</label>
    <input id="reg-pw" type="password" value="password123">
    <button onclick="register()">회원가입</button>
  </div>

  <!-- 로그인 -->
  <div class="card">
    <h2>로그인</h2>
    <label>이메일</label>
    <input id="login-email" value="demo@fitstreak.dev">
    <label>비밀번호</label>
    <input id="login-pw" type="password" value="password123">
    <button onclick="login()">로그인 & 토큰 저장</button>
  </div>

  <!-- 운동 기록 -->
  <div class="card">
    <h2>운동 기록</h2>
    <label>메모 (최대 280자)</label>
    <textarea id="workout-note" placeholder="오늘 운동 내용...">스쿼트 5세트, 벤치프레스 5세트 완료 💪</textarea>
    <label>GPS 인증 여부</label>
    <select id="workout-gps">
      <option value="true">✅ GPS 인증됨</option>
      <option value="false">❌ 미인증</option>
    </select>
    <button onclick="logWorkout()">운동 기록하기</button>
  </div>

  <!-- Streak & 프로필 -->
  <div class="card">
    <h2>Streak 조회</h2>
    <div class="streak-display">
      <div class="streak-num" id="s-current">-</div>
      <div class="streak-label">현재 연속 일수</div>
      <div class="streak-sub">
        <div><div class="n" id="s-longest">-</div><div class="l">최장 기록</div></div>
        <div><div class="n" id="s-last">-</div><div class="l">마지막 운동</div></div>
        <div><div class="n" id="s-alive">-</div><div class="l">오늘 상태</div></div>
      </div>
    </div>
    <button onclick="getStreak()">Streak 불러오기</button>
  </div>

  <!-- 운동 기록 목록 -->
  <div class="card">
    <h2>내 운동 기록 목록</h2>
    <label>페이지</label>
    <input id="log-page" value="1" type="number" min="1">
    <button onclick="getLogs()">기록 조회</button>
  </div>

  <!-- 소셜 -->
  <div class="card">
    <h2>소셜</h2>
    <label>팔로우할 사용자 ID</label>
    <input id="follow-id" placeholder="UUID">
    <button onclick="follow()">팔로우</button>
    <button class="danger" onclick="unfollow()" style="margin-top:6px">언팔로우</button>
    <hr>
    <label>리액션할 운동 로그 ID</label>
    <input id="reaction-log-id" placeholder="운동 로그 UUID">
    <label>리액션 종류</label>
    <select id="reaction-type">
      <option value="like">👍 like</option>
      <option value="fire">🔥 fire</option>
      <option value="strong">💪 strong</option>
    </select>
    <button onclick="addReaction()">리액션 추가</button>
  </div>

  <!-- 결과 -->
  <div class="result">
    <h2>응답 결과 <span id="status-badge"></span></h2>
    <pre id="result">여기에 API 응답이 표시됩니다.</pre>
  </div>

</div>

<script>
  const BASE = 'http://localhost:3000';
  let token = '';

  async function call(method, path, body) {
    try {
      const res = await fetch(BASE + path, {
        method,
        headers: {
          ...(body ? { 'Content-Type': 'application/json' } : {}),
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      const badge = document.getElementById('status-badge');
      const ok = res.status < 400;
      badge.textContent = res.status + (ok ? ' OK' : ' Error');
      badge.className = 'badge ' + (ok ? 'ok' : 'err');
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      return { ok, data, status: res.status };
    } catch (e) {
      document.getElementById('result').textContent = '❌ 연결 실패: ' + e.message + '\n\n서버가 실행 중인지 확인하세요: npm run dev';
    }
  }

  async function register() {
    const r = await call('POST', '/auth/register', {
      email: document.getElementById('reg-email').value,
      displayName: document.getElementById('reg-name').value,
      password: document.getElementById('reg-pw').value,
      timezone: 'Asia/Seoul',
    });
    if (r?.ok) { token = r.data.token; updateToken(); }
  }

  async function login() {
    const r = await call('POST', '/auth/login', {
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-pw').value,
    });
    if (r?.ok) { token = r.data.token; updateToken(); }
  }

  async function logWorkout() {
    const r = await call('POST', '/workouts', {
      note: document.getElementById('workout-note').value,
      gpsVerified: document.getElementById('workout-gps').value === 'true',
    });
    if (r?.ok) getStreak();
  }

  async function getStreak() {
    const r = await call('GET', '/workouts/streak');
    if (r?.ok) {
      const s = r.data.streak;
      document.getElementById('s-current').textContent = s.currentStreak;
      document.getElementById('s-longest').textContent = s.longestStreak;
      document.getElementById('s-last').textContent = s.lastLogDate ?? '-';
      document.getElementById('s-alive').textContent = s.isAliveToday ? '🟡 유지중' : (s.currentStreak > 0 ? '✅ 완료' : '❌ 없음');
    }
  }

  async function getLogs() {
    await call('GET', `/workouts?page=${document.getElementById('log-page').value}&limit=10`);
  }

  async function follow() {
    const id = document.getElementById('follow-id').value.trim();
    if (!id) return alert('사용자 ID를 입력하세요.');
    await call('POST', `/users/${id}/follow`);
  }

  async function unfollow() {
    const id = document.getElementById('follow-id').value.trim();
    if (!id) return alert('사용자 ID를 입력하세요.');
    await call('DELETE', `/users/${id}/follow`);
  }

  async function addReaction() {
    const id = document.getElementById('reaction-log-id').value.trim();
    if (!id) return alert('운동 로그 ID를 입력하세요.');
    await call('POST', `/workouts/${id}/reactions`, {
      type: document.getElementById('reaction-type').value,
    });
  }

  function updateToken() {
    const display = document.getElementById('token-display');
    display.textContent = token ? token.slice(0, 40) + '...' : '없음';
  }
</script>
</body>
</html>
